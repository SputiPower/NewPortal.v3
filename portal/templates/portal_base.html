<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}NewsPortal{% endblock %}</title>

    <style>
        body { margin:0; font-family: 'Inter', sans-serif; background:#f0f4f8; }
        body.dark-mode { background:#121212; color:#eee; }

        .navbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 40px;
            background:#2563eb;
            color:white;
            font-weight:600;
        }

        .logo { font-size:22px; }

        .nav-links a {
            margin-left:15px;
            color:white;
            text-decoration:none;
        }

        .nav-links a:hover {
            text-decoration:underline;
        }

        .theme-toggle {
            margin-left:15px;
            background:none;
            border:none;
            color:white;
            cursor:pointer;
            font-size:18px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <a href="{% url 'home' %}" style="color:white; text-decoration:none;">
            NewsPortal
        </a>
    </div>

    <div class="nav-links">
        {% if user.is_authenticated %}
            <span>Привет, {{ user.email }}</span>
            <a href="{% url 'account_logout' %}">Выйти</a>
        {% else %}
            <a href="{% url 'account_login' %}">Войти</a>
            <a href="{% url 'account_signup' %}">Зарегистрироваться</a>
        {% endif %}
        <button class="theme-toggle"
                onclick="document.body.classList.toggle('dark-mode')">
            🌓
        </button>
    </div>
</div>

{% block content %}{% endblock %}

</body>
</html>

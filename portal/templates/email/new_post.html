<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .header { background: #343a40; color: #fff; padding: 10px; text-align: center; }
        .content { padding: 15px; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .preview { font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">NewsPortal</div>
    <div class="content">
        <p>Здравствуй, {{ username }}! Новая статья в твоём любимом разделе:</p>
        <div class="title">{{ post.title }}</div>
        <div class="preview">{{ post.text|truncatechars:50 }}</div>
        <p>Перейти к статье можно на сайте.</p>
    </div>
</body>
</html>

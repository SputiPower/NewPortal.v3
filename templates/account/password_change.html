{% extends 'base.html' %}

{% block title %}Смена пароля{% endblock %}
{% block body_class %}f66-body{% endblock %}

{% block content %}
<div class="f66-shell">
  <section class="f66-section" style="padding-top:8rem;">
    <div class="f66-container" style="max-width:700px;">
      <div class="profile-card glass-elevated reveal-on-scroll">
        <h2>Смена пароля</h2>
        <form method="post" class="post-form">
          {% csrf_token %}
          {% for field in form %}
          <div class="form-field">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<span class="form-error">{{ field.errors.0 }}</span>{% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="f66-btn f66-btn-primary">Сохранить пароль</button>
        </form>
      </div>
    </div>
  </section>
</div>
{% endblock %}

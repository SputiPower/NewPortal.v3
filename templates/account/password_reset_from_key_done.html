{% extends "base.html" %}

{% block title %}Пароль изменен{% endblock %}
{% block body_class %}f66-body{% endblock %}

{% block content %}
<div class="f66-shell">
  <section class="f66-section f66-section-offset-top">
    <div class="f66-container-auth">
      <section class="profile-card glass-elevated reveal-on-scroll auth-card">
        <h2>Пароль обновлен</h2>
        <p class="auth-muted auth-lead">Пароль успешно изменен. Теперь вы можете войти с новыми данными.</p>
        <p class="auth-muted auth-links">
          <a href="{% url 'account_login' %}">Войти в аккаунт</a>
        </p>
      </section>
    </div>
  </section>
</div>
{% endblock %}

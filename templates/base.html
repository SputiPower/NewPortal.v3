{% load static socialaccount %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>{% block title %}Новости{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Основные стили -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <link rel="stylesheet" href="{% static 'css/news.css' %}" />
    <link rel="stylesheet" href="{% static 'css/account.css' %}" />

    <!-- Favicon -->
    <link rel="icon" href="{% static 'assets/favicon.ico' %}" type="image/x-icon" />
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">NewsPortal</a>
        <div class="d-flex ms-auto align-items-center gap-2">
            {% if user.is_authenticated %}
                <span class="nav-username">Привет, {{ user.email|default:user.username }}</span>
                <a href="{% url 'account_logout' %}" class="btn btn-logout">Выйти</a>
            {% else %}
                <a href="{% url 'account_login' %}" class="btn btn-login">Войти</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- 3D Земля -->
<script type="module" src="{% static 'js/earth.js' %}"></script>
<div class="container">

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Наш Earth скрипт -->
<script type="module" src="{% static 'js/earth.js' %}"></script>
</body>
</html>

</body>
</html>

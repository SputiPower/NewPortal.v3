{% extends "base.html" %}

{% block title %}NewsPortal | Home{% endblock %}
{% block body_class %}premium-page{% endblock %}

{% block content %}
<div class="content-shell">
  <header class="page-hero reveal">
    <h1 class="page-title">NewsPortal</h1>
    <p class="page-subtitle">Премиальная платформа новостей и статей.</p>
  </header>

  <section class="panel glass-surface reveal" style="text-align:center;">
    <div class="hero-actions">
      <a href="{% url 'news_list' %}" class="btn-premium btn-primary-premium">Новости</a>
      <a href="{% url 'article_list' %}" class="btn-premium btn-ghost-premium">Статьи</a>
    </div>
  </section>
</div>
{% endblock %}
